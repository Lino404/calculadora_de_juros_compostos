<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Juros Compostos</title>
</head>
<body>
    <h1>Calculadora de Juros Compostos</h1>
    
    <div>
        <label for="capital">Capital Inicial (R$):</label>
        <input type="number" id="capital" placeholder="Ex: 1000">
    </div>
    <br>
    <div>
        <label for="taxa">Taxa de Juros (% ao mês):</label>
        <input type="number" id="taxa" placeholder="Ex: 1">
    </div>
    <br>
    <div>
        <label for="tempo">Tempo (em meses):</label>
        <input type="number" id="tempo" placeholder="Ex: 12">
    </div>
    <br>
    <button id="btnCalcular">Calcular Montante</button>

    <h2 id="resultado">Resultado: R$ 0,00</h2>

    <script src="script.js"></script>
</body>
</html>
