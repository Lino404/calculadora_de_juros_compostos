<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Juros Compostos</title>
    <!-- Link para fontes modernas -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <!-- Link para o CSS que vai deixar bonito -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📈 Juros Compostos</h1>
        <p class="subtitle">Simule a evolução do seu dinheiro</p>
        
        <div class="input-group">
            <label for="capital">Capital Inicial</label>
            <input type="number" id="capital" placeholder="R$ 0,00">
        </div>
        
        <div class="input-group">
            <label for="taxa">Taxa de Juros (% ao mês)</label>
            <input type="number" id="taxa" placeholder="0%">
        </div>
        
        <div class="input-group">
            <label for="tempo">Tempo (meses)</label>
            <input type="number" id="tempo" placeholder="0">
        </div>
        
        <button id="btnCalcular">Calcular Rendimento</button>

        <div class="result-box">
            <span>Montante Final:</span>
            <h2 id="resultado">R$ 0,00</h2>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
